<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings | Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; }
        .topbar { background: linear-gradient(135deg, #1a1a2e, #0f3460); }
        .booking-card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    </style>
</head>
<body>
<nav class="topbar navbar px-4 py-3">
    <a class="navbar-brand text-white fw-bold" href="/customer/home">
        <i class="bi bi-car-front-fill me-2"></i>DriveEasy
    </a>
    <div class="d-flex align-items-center gap-3">
        <a href="/customer/cars" class="text-white text-decoration-none small">Browse Cars</a>
        <a href="/customer/mybookings" class="text-white text-decoration-none small">My Bookings</a>
        <a href="/customer/profile" class="text-white text-decoration-none small">Profile</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">My Bookings</h4>
            <small class="text-muted">Your reservation history</small>
        </div>
        <a href="/customer/cars" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Book a Car
        </a>
    </div>

    <!-- Bookings list -->
    <div class="row g-3">
        <div class="col-12" th:each="b : ${bookings}">
            <div class="booking-card card p-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-3">
                        <div style="width:52px;height:52px;background:#e8f0ff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#0d6efd;">
                            <i class="bi bi-car-front"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold mb-0" th:text="'Vehicle: ' + ${b.vehicleId}"></h6>
                            <small class="text-muted">
                                <i class="bi bi-calendar me-1"></i>
                                <span th:text="${b.startDate}"></span>
                                <i class="bi bi-arrow-right mx-1"></i>
                                <span th:text="${b.endDate}"></span>
                            </small>
                        </div>
                    </div>
                    <div class="text-end">
                        <span class="badge rounded-pill"
                              th:classappend="${b.status == 'Confirmed'} ? 'bg-success' : (${b.status == 'Cancelled'} ? 'bg-danger' : 'bg-secondary')"
                              th:text="${b.status}"></span>
                        <div class="small text-muted mt-1" th:text="'ID: ' + ${b.bookingId}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${#lists.isEmpty(bookings)}">
            <div class="card border-0 shadow-sm rounded-4 p-5 text-center">
                <i class="bi bi-calendar-x fs-1 text-muted mb-3"></i>
                <h5 class="text-muted">No bookings yet</h5>
                <a href="/customer/cars" class="btn btn-primary mt-2">Book your first car</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
