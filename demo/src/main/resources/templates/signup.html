<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .signup-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white;
            margin: 0 auto 1.2rem;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 10px;
            padding: 0.7rem 1rem;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #0d6efd;
            color: white;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-label { color: rgba(255,255,255,0.8); font-size: 0.88rem; margin-bottom: 0.3rem; }
        .btn-signup {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border: none; border-radius: 10px;
            padding: 0.75rem; font-weight: 600;
            width: 100%; color: white; font-size: 1rem;
            transition: opacity 0.2s;
            cursor: pointer;
        }
        .btn-signup:hover { opacity: 0.9; color: white; }
        h5 { color: white; }
    </style>
</head>
<body>
<div class="signup-card">
    <div class="brand-icon">
        <i class="bi bi-car-front-fill"></i>
    </div>
    <h5 class="text-center fw-bold mb-1">Create Account</h5>
    <p class="text-center mb-4" style="color:rgba(255,255,255,0.5); font-size:0.88rem;">
        Join DriveEasy and start renting today
    </p>

    <div th:if="${error}" class="alert alert-danger py-2 small mb-3" th:text="${error}"></div>

    <form method="post" action="/signup">
        <div class="row g-2">
            <div class="col-12">
                <label class="form-label">Full Name</label>
                <input type="text" name="fullName" class="form-control"
                       placeholder="e.g. John Smith" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Choose a username" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Choose a password" required>
            </div>
            <div class="col-12">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       placeholder="your@email.com" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control"
                       placeholder="e.g. 0771234567" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">License Number</label>
                <input type="text" name="licenseNumber" class="form-control"
                       placeholder="e.g. DL-123456" required>
            </div>
        </div>

        <button type="submit" class="btn-signup mt-4 mb-3">
            <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
    </form>

    <div class="text-center">
        <span style="color:rgba(255,255,255,0.5); font-size:0.9rem;">Already have an account? </span>
        <a href="/login" style="color:#0dcaf0; font-size:0.9rem; text-decoration:none; font-weight:600;">Sign In</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
