<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Return | Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; }
        .sidebar .nav-link { color: #495057; border-radius: 6px; margin: 2px 8px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #0d6efd; color: #fff; }
        .fine-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 1rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-3">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-car-front-fill me-2"></i>Car Rental System</a>
    <span class="text-white-50 small">SE1020 OOP Project</span>
</nav>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li><a class="nav-link" href="/"><i class="bi bi-house-door me-2"></i>Dashboard</a></li>
                <hr class="my-2">
                <li><small class="text-muted px-3 fw-bold">MANAGEMENT</small></li>
                <li><a class="nav-link" href="/vehicles"><i class="bi bi-car-front me-2"></i>Vehicles</a></li>
                <li><a class="nav-link" href="/users"><i class="bi bi-people me-2"></i>Users</a></li>
                <li><a class="nav-link" href="/bookings"><i class="bi bi-calendar-check me-2"></i>Bookings</a></li>
                <li><a class="nav-link" href="/payments"><i class="bi bi-credit-card me-2"></i>Payments</a></li>
                <li><a class="nav-link active" href="/returns"><i class="bi bi-arrow-return-left me-2"></i>Returns</a></li>
                <li><a class="nav-link" href="/insurance"><i class="bi bi-shield-check me-2"></i>Insurance</a></li>
            </ul>
        </nav>
        <main class="col-md-10 p-4">
            <div class="mb-4">
                <a href="/returns" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Back to Returns
                </a>
                <h4 class="fw-bold mt-1 mb-0">Edit Return Report</h4>
                <small class="text-muted">Update return status and recalculate fine</small>
            </div>
            <div class="card shadow-sm" style="max-width: 700px;">
                <div class="card-body p-4">
                    <form method="post" action="/returns/edit">
                        <input type="hidden" name="index" th:value="${index}">
                        <input type="hidden" name="returnId" th:value="${returnReport.returnId}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Booking ID</label>
                                <input type="text" name="bookingId" class="form-control" th:value="${returnReport.bookingId}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Vehicle ID</label>
                                <input type="text" name="vehicleId" class="form-control" th:value="${returnReport.vehicleId}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">User ID</label>
                                <input type="text" name="userId" class="form-control" th:value="${returnReport.userId}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Member Type</label>
                                <select name="memberType" class="form-select" id="memberType" required>
                                    <option value="Regular" th:selected="${returnReport.memberType == 'Regular'}">Regular (Rs. 625/late day)</option>
                                    <option value="Premium" th:selected="${returnReport.memberType == 'Premium'}">Premium (Rs. 250/late day)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Expected Return Date</label>
                                <input type="date" name="expectedDate" class="form-control" id="expectedDate" th:value="${returnReport.expectedDate}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Actual Return Date</label>
                                <input type="date" name="returnDate" class="form-control" id="returnDate" th:value="${returnReport.returnDate}" required>
                            </div>
                            <div class="col-12">
                                <div class="fine-box">
                                    <div class="d-flex align-items-center justify-content-between">
                                        <div>
                                            <i class="bi bi-calculator me-2 text-warning"></i>
                                            <strong>Late Fee Calculator</strong>
                                            <div class="small text-muted mt-1" id="fineDetails">Change dates to recalculate</div>
                                        </div>
                                        <div class="text-end">
                                            <div class="fs-4 fw-bold text-danger" id="fineAmount" th:text="'Rs. ' + ${returnReport.lateFine}">Rs. 0.00</div>
                                            <small class="text-muted">calculated fine</small>
                                        </div>
                                    </div>
                                </div>
                                <input type="hidden" name="lateFine" id="lateFine" th:value="${returnReport.lateFine}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Vehicle Condition</label>
                                <select name="condition" class="form-select" required>
                                    <option value="Good"     th:selected="${returnReport.condition == 'Good'}">Good</option>
                                    <option value="Damaged"  th:selected="${returnReport.condition == 'Damaged'}">Damaged</option>
                                    <option value="Totalled" th:selected="${returnReport.condition == 'Totalled'}">Totalled</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Notes</label>
                                <textarea name="notes" class="form-control" rows="3"
                                          th:text="${returnReport.notes}"></textarea>
                            </div>
                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg me-1"></i>Save Changes
                            </button>
                            <a href="/returns" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function calculateFine() {
        const expectedDate = document.getElementById('expectedDate').value;
        const returnDate = document.getElementById('returnDate').value;
        const memberType = document.getElementById('memberType').value;

        if (expectedDate && returnDate) {
            const expected = new Date(expectedDate);
            const returned = new Date(returnDate);
            const diffMs = returned - expected;
            const lateDays = Math.max(0, Math.ceil(diffMs / (1000 * 60 * 60 * 24)));
            const ratePerDay = memberType === 'Premium' ? 250 : 625;
            const fine = lateDays * ratePerDay;

            document.getElementById('fineAmount').textContent = 'Rs. ' + fine.toFixed(2);
            document.getElementById('lateFine').value = fine;

            if (lateDays === 0) {
                document.getElementById('fineDetails').textContent = 'Returned on time — no fine!';
                document.getElementById('fineAmount').className = 'fs-4 fw-bold text-success';
            } else {
                document.getElementById('fineDetails').textContent =
                    lateDays + ' day(s) late × Rs. ' + ratePerDay + '/day (' + memberType + ' member)';
                document.getElementById('fineAmount').className = 'fs-4 fw-bold text-danger';
            }
        }
    }

    document.getElementById('expectedDate').addEventListener('change', calculateFine);
    document.getElementById('returnDate').addEventListener('change', calculateFine);
    document.getElementById('memberType').addEventListener('change', calculateFine);
</script>
</body>
</html>
