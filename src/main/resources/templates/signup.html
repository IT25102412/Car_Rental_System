<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .signup-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white;
            margin: 0 auto 1.2rem;
        }
        .form-control, .form-select {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 10px;
            padding: 0.7rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.12);
            border-color: #0d6efd;
            color: white;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.2);
        }
        .form-select option { background: #1a1a2e; color: white; }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-label { color: rgba(255,255,255,0.8); font-size: 0.88rem; margin-bottom: 0.3rem; }
        .btn-signup {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border: none; border-radius: 10px;
            padding: 0.75rem; font-weight: 600;
            width: 100%; color: white; font-size: 1rem;
            transition: opacity 0.2s;
            cursor: pointer;
        }
        .btn-signup:hover { opacity: 0.9; color: white; }
        .section-divider {
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 1rem 0 0.5rem;
        }
        h5 { color: white; }
    </style>
</head>
<body>
<div class="signup-card">
    <div class="brand-icon">
        <i class="bi bi-car-front-fill"></i>
    </div>
    <h5 class="text-center fw-bold mb-1">Create Account</h5>
    <p class="text-center mb-4" style="color:rgba(255,255,255,0.5); font-size:0.88rem;">
        Join DriveEasy and start renting today
    </p>

    <div th:if="${error}" class="alert alert-danger py-2 small mb-3" th:text="${error}"></div>

    <form method="post" action="/signup">
        <div class="row g-2">

            <!-- Personal Info -->
            <div class="col-12">
                <label class="form-label">Full Name</label>
                <input type="text" name="fullName" class="form-control"
                       placeholder="e.g. John Smith" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Choose a username" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Choose a password" required>
            </div>
            <div class="col-12">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       placeholder="your@email.com" required>
            </div>
            <div class="col-12">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control"
                       placeholder="e.g. 0771234567" required>
            </div>

            <!-- ID Type -->
            <div class="col-12">
                <label class="form-label">ID Type</label>
                <div class="d-flex gap-3 mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="idType" id="nicRadio"
                               value="NIC" checked onclick="toggleIdField('NIC')">
                        <label class="form-check-label" for="nicRadio"
                               style="color:rgba(255,255,255,0.8)">NIC</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="idType" id="passportRadio"
                               value="Passport" onclick="toggleIdField('Passport')">
                        <label class="form-check-label" for="passportRadio"
                               style="color:rgba(255,255,255,0.8)">Passport</label>
                    </div>
                </div>
                <input type="text" id="nicField" name="nicOrPassport" class="form-control"
                       placeholder="e.g. 200112345678 or 991234567V" required>
            </div>

            <!-- Security Question -->
            <div class="col-12 section-divider"></div>
            <div class="col-12">
                <label class="form-label">
                    <i class="bi bi-shield-lock me-1"></i>Security Question
                    <span style="color:rgba(255,255,255,0.4);font-size:0.8rem;">
                        (used to recover your password)
                    </span>
                </label>
                <select name="securityQuestion" class="form-select mb-2" required>
                    <option value="">-- Select a question --</option>
                    <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                    <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                    <option value="What was the name of your primary school?">What was the name of your primary school?</option>
                    <option value="What is your favourite movie?">What is your favourite movie?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                </select>
                <input type="text" name="securityAnswer" class="form-control"
                       placeholder="Your answer to the question above" required>
            </div>

        </div>

        <button type="submit" class="btn-signup mt-4 mb-3">
            <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
    </form>

    <div class="text-center">
        <span style="color:rgba(255,255,255,0.5); font-size:0.9rem;">Already have an account? </span>
        <a href="/login" style="color:#0dcaf0; font-size:0.9rem; text-decoration:none; font-weight:600;">Sign In</a>
    </div>
</div>

<script>
    function toggleIdField(type) {
        const field = document.getElementById('nicField');
        if (type === 'NIC') {
            field.placeholder = 'e.g. 200112345678 or 991234567V';
        } else {
            field.placeholder = 'e.g. N1234567';
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
