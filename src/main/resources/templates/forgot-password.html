<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .card-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 2.5rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white; margin: 0 auto 1.2rem;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white; border-radius: 10px; padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #0d6efd; color: white;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-label { color: rgba(255,255,255,0.8); font-size: 0.9rem; }
        .btn-main {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border: none; border-radius: 10px; padding: 0.75rem;
            font-weight: 600; width: 100%; color: white; font-size: 1rem;
            cursor: pointer;
        }
        .btn-main:hover { opacity: 0.9; color: white; }
        h5 { color: white; }
    </style>
</head>
<body>
<div class="card-box">
    <div class="brand-icon"><i class="bi bi-lock"></i></div>
    <h5 class="text-center fw-bold mb-1">Forgot Password</h5>
    <p class="text-center mb-4" style="color:rgba(255,255,255,0.5);font-size:0.88rem;">
        Enter your username to reset your password
    </p>
    <div th:if="${error}" class="alert alert-danger py-2 small mb-3" th:text="${error}"></div>
    <form method="post" action="/forgot-password">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Enter your username" required autofocus>
        </div>
        <button type="submit" class="btn-main mb-3">
            <i class="bi bi-arrow-right me-2"></i>Continue
        </button>
    </form>
    <div class="text-center">
        <a href="/login" style="color:#0dcaf0;font-size:0.9rem;text-decoration:none;">
            <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
