<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .card-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 2.5rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #198754, #20c997);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white; margin: 0 auto 1.2rem;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white; border-radius: 10px; padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #198754; color: white;
            box-shadow: 0 0 0 3px rgba(25,135,84,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-label { color: rgba(255,255,255,0.8); font-size: 0.9rem; }
        .btn-main {
            background: linear-gradient(135deg, #198754, #20c997);
            border: none; border-radius: 10px; padding: 0.75rem;
            font-weight: 600; width: 100%; color: white; font-size: 1rem;
            cursor: pointer;
        }
        .btn-main:hover { opacity: 0.9; color: white; }
        h5 { color: white; }
    </style>
</head>
<body>
<div class="card-box">
    <div class="brand-icon"><i class="bi bi-key"></i></div>
    <h5 class="text-center fw-bold mb-1">Reset Password</h5>
    <p class="text-center mb-4" style="color:rgba(255,255,255,0.5);font-size:0.88rem;">
        Enter your new password below
    </p>
    <form method="post" action="/reset-password">
        <input type="hidden" name="username" th:value="${username}">
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="newPassword" class="form-control"
                   placeholder="Enter new password" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirmPwd" class="form-control"
                   placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn-main mb-3" onclick="return checkPasswords()">
            <i class="bi bi-check-lg me-2"></i>Reset Password
        </button>
    </form>
    <div class="text-center">
        <a href="/login" style="color:#0dcaf0;font-size:0.9rem;text-decoration:none;">
            <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
    </div>
</div>
<script>
    function checkPasswords() {
        const pwd = document.querySelector('[name="newPassword"]').value;
        const confirm = document.getElementById('confirmPwd').value;
        if (pwd !== confirm) {
            alert('Passwords do not match!');
            return false;
        }
        return true;
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
