<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile | Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; }
        .topbar { background: linear-gradient(135deg, #1a1a2e, #0f3460); }
        .avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #0d6efd, #0dcaf0); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; }
    </style>
</head>
<body>
<nav class="topbar navbar px-4 py-3">
    <a class="navbar-brand text-white fw-bold" href="/customer/home">
        <i class="bi bi-car-front-fill me-2"></i>DriveEasy
    </a>
    <div class="d-flex align-items-center gap-3">
        <a href="/customer/cars" class="text-white text-decoration-none small">Browse Cars</a>
        <a href="/customer/mybookings" class="text-white text-decoration-none small">My Bookings</a>
        <a href="/customer/profile" class="text-white text-decoration-none small">Profile</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container py-4" style="max-width: 680px;">
    <h4 class="fw-bold mb-4">My Profile</h4>

    <!-- Avatar + name -->
    <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
        <div class="d-flex align-items-center gap-3">
            <div class="avatar">
                <i class="bi bi-person-fill"></i>
            </div>
            <div>
                <h5 class="fw-bold mb-0" th:text="${user.fullName}"></h5>
                <span class="badge bg-primary" th:text="${user.userType}"></span>
                <div class="text-muted small mt-1" th:text="${user.email}"></div>
            </div>
        </div>
    </div>

    <!-- Edit form -->
    <div class="card border-0 shadow-sm rounded-4 p-4">
        <h6 class="fw-bold mb-3">Update Details</h6>
        <form method="post" action="/customer/profile">
            <input type="hidden" name="userId" th:value="${user.userId}">
            <input type="hidden" name="username" th:value="${user.username}">
            <input type="hidden" name="password" th:value="${user.password}">
            <input type="hidden" name="userType" th:value="${user.userType}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="fullName" class="form-control"
                           th:value="${user.fullName}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control"
                           th:value="${user.email}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone</label>
                    <input type="text" name="phone" class="form-control"
                           th:value="${user.phone}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">NIC / Passport</label>
                    <input type="text" name="nicOrPassport" class="form-control"
                           th:value="${user.nicOrPassport}" required>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Save Changes
                </button>
                <a href="/customer/home" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
