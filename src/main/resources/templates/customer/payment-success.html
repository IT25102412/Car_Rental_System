<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful | Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; }
        .topbar { background: linear-gradient(135deg, #1a1a2e, #0f3460); }
        .success-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #198754, #20c997);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 2.2rem; color: white; margin: 0 auto 1.5rem;
        }
        @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.1)} 100%{transform:scale(1)} }
        .success-icon { animation: pop 0.4s ease; }
    </style>
</head>
<body>
<nav class="topbar navbar px-4 py-3">
    <a class="navbar-brand text-white fw-bold" href="/customer/home">
        <i class="bi bi-car-front-fill me-2"></i>DriveEasy
    </a>
    <div class="d-flex align-items-center gap-3">
        <a href="/customer/cars" class="text-white text-decoration-none small">Browse Cars</a>
        <a href="/customer/mybookings" class="text-white text-decoration-none small">My Bookings</a>
        <a href="/customer/profile" class="text-white text-decoration-none small">Profile</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container py-5" style="max-width: 560px;">
    <div class="card border-0 shadow-sm rounded-4 p-5 text-center">
        <div class="success-icon">
            <i class="bi bi-check-lg"></i>
        </div>
        <h4 class="fw-bold mb-1">Payment Successful!</h4>
        <p class="text-muted mb-4">Your booking is confirmed and payment has been recorded.</p>

        <div class="bg-light rounded-3 p-3 mb-4 text-start">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted small">Booking ID</span>
                <span class="fw-semibold small" th:text="${booking.bookingId}"></span>
            </div>
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted small">Vehicle</span>
                <span class="fw-semibold small" th:text="${booking.vehicleId}"></span>
            </div>
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted small">Dates</span>
                <span class="fw-semibold small" th:text="${booking.startDate} + ' → ' + ${booking.endDate}"></span>
            </div>
            <div class="d-flex justify-content-between border-top pt-2 mt-2">
                <span class="fw-bold">Total Paid</span>
                <span class="fw-bold text-success fs-5" th:text="'$' + ${total}"></span>
            </div>
        </div>

        <div class="d-flex gap-2 justify-content-center">
            <a href="/customer/mybookings" class="btn btn-primary px-4">
                <i class="bi bi-calendar-check me-1"></i>My Bookings
            </a>
            <a href="/customer/cars" class="btn btn-outline-secondary px-4">
                Book Another
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
