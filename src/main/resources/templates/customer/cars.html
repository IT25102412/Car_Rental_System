<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Browse Cars | Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; }
        .topbar { background: linear-gradient(135deg, #1a1a2e, #0f3460); }
        .car-card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); transition: transform .2s; }
        .car-card:hover { transform: translateY(-4px); }
        .car-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #e8f0ff, #d0e4ff); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #0d6efd; }
        .badge-category { font-size: 0.75rem; padding: 0.35em 0.75em; border-radius: 20px; }
    </style>
</head>
<body>
<nav class="topbar navbar px-4 py-3">
    <a class="navbar-brand text-white fw-bold" href="/customer/home">
        <i class="bi bi-car-front-fill me-2"></i>DriveEasy
    </a>
    <div class="d-flex align-items-center gap-3">
        <a href="/customer/cars" class="text-white text-decoration-none small">Browse Cars</a>
        <a href="/customer/mybookings" class="text-white text-decoration-none small">My Bookings</a>
        <a href="/customer/profile" class="text-white text-decoration-none small">Profile</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Available Cars</h4>
            <small class="text-muted">Choose your perfect ride</small>
        </div>
    </div>

    <!-- Category filter -->
    <div class="d-flex gap-2 mb-4 flex-wrap">
        <a href="/customer/cars" class="btn btn-sm"
           th:classappend="${selectedCategory == ''} ? 'btn-primary' : 'btn-outline-primary'">All</a>
        <a href="/customer/cars?category=Sedan" class="btn btn-sm"
           th:classappend="${selectedCategory == 'Sedan'} ? 'btn-primary' : 'btn-outline-primary'">Sedan</a>
        <a href="/customer/cars?category=SUV" class="btn btn-sm"
           th:classappend="${selectedCategory == 'SUV'} ? 'btn-primary' : 'btn-outline-primary'">SUV</a>
        <a href="/customer/cars?category=Electric" class="btn btn-sm"
           th:classappend="${selectedCategory == 'Electric'} ? 'btn-primary' : 'btn-outline-primary'">Electric</a>
        <a href="/customer/cars?category=Van" class="btn btn-sm"
           th:classappend="${selectedCategory == 'Van'} ? 'btn-primary' : 'btn-outline-primary'">Van</a>
        <a href="/customer/cars?category=Truck" class="btn btn-sm"
           th:classappend="${selectedCategory == 'Truck'} ? 'btn-primary' : 'btn-outline-primary'">Truck</a>
    </div>

    <!-- Car grid -->
    <div class="row g-3">
        <div class="col-md-4" th:each="car : ${cars}">
            <div class="car-card card p-4">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="car-icon">
                        <i class="bi bi-car-front" th:classappend="${car.category == 'Electric'} ? ' bi-lightning-charge' : ''"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-0" th:text="${car.make} + ' ' + ${car.model}"></h6>
                        <span class="badge bg-info text-dark badge-category" th:text="${car.category}"></span>
                    </div>
                </div>
                <div class="row g-2 mb-3 small text-muted">
                    <div class="col-6">
                        <i class="bi bi-card-text me-1"></i>
                        <span th:text="${car.licensePlate}"></span>
                    </div>
                    <div class="col-6">
                        <i class="bi bi-speedometer2 me-1"></i>
                        <span th:text="${car.mileage} + ' km'"></span>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="fs-5 fw-bold text-primary" th:text="'LKR ' + ${car.dailyRate}"></span>
                        <span class="text-muted small">/day</span>
                    </div>
                    <a th:href="@{/customer/book/{id}(id=${car.vehicleId})}"
                       class="btn btn-primary btn-sm px-3">
                        <i class="bi bi-calendar-plus me-1"></i>Book Now
                    </a>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${#lists.isEmpty(cars)}">
            <div class="card border-0 shadow-sm rounded-4 p-5 text-center">
                <i class="bi bi-car-front fs-1 text-muted mb-3"></i>
                <h5 class="text-muted">No cars available in this category</h5>
                <a href="/customer/cars" class="btn btn-outline-primary mt-2">View all cars</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
