<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: white;
            margin: 0 auto 1.5rem;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #0d6efd;
            color: white;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-label { color: rgba(255,255,255,0.8); font-size: 0.9rem; }
        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border: none; border-radius: 10px;
            padding: 0.75rem; font-weight: 600;
            letter-spacing: 0.5px; width: 100%;
            color: white; font-size: 1rem;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; color: white; }
        .hint-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 0.75rem 1rem;
            font-size: 0.8rem; color: rgba(255,255,255,0.5);
        }
        h4, p { color: white; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-icon">
        <i class="bi bi-car-front-fill"></i>
    </div>
    <h4 class="text-center fw-bold mb-1">DriveEase</h4>
    <p class="text-center mb-4" style="color:rgba(255,255,255,0.5); font-size:0.9rem;">SE1020 OOP Project</p>

    <div th:if="${error}" class="alert alert-danger py-2 small mb-3" th:text="${error}"></div>

    <form method="post" action="/login">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Enter your username" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login mb-4">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
    </form>

    <div class="hint-box mb-3">
        <div class="mb-1"><i class="bi bi-shield-lock me-1"></i><strong style="color:rgba(255,255,255,0.7)">Admin:</strong> admin / admin123</div>
        <div><i class="bi bi-person me-1"></i><strong style="color:rgba(255,255,255,0.7)">Customer:</strong> use registered username & password</div>
    </div>

    <div class="text-center mb-2">
        <a href="/forgot-password" style="color:#0dcaf0;font-size:0.9rem;text-decoration:none;">
            <i class="bi bi-lock me-1"></i>Forgot Password?
        </a>
    </div>
    <div class="text-center">
        <span style="color:rgba(255,255,255,0.5); font-size:0.9rem;">New customer? </span>
        <a href="/signup" style="color:#0dcaf0; font-size:0.9rem; text-decoration:none; font-weight:600;">Create an account</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
